{% extends "base.html" %}

{% block title %}Payment{% endblock %}

{% block content %}

<div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow">

    <h1 class="text-3xl font-bold mb-6">
        Payment Details
    </h1>

    <form method="POST" action="{{ url_for('confirm_payment') }}">

        <input
            type="hidden"
            name="flight_data"
            value='{{ flight | tojson | safe }}'
        >

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Bank Name
            </label>

            <input
                type="text"
                name="bank_name"
                class="w-full border p-3 rounded"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Card Holder Name
            </label>

            <input
                type="text"
                name="card_holder"
                class="w-full border p-3 rounded"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                Card Number
            </label>

            <input
                type="text"
                name="card_number"
                class="w-full border p-3 rounded"
                required
            >
        </div>

        <div class="mb-4">
            <label class="block font-semibold mb-2">
                CVV
            </label>

            <input
                type="password"
                name="cvv"
                class="w-full border p-3 rounded"
                required
            >
        </div>

        <button
            type="submit"
            class="bg-indigo-600 text-white px-6 py-3 rounded-lg"
        >
            Confirm Payment
        </button>

    </form>

</div>

{% endblock %}

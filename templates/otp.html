{% extends "base.html" %}

{% block title %}Verify OTP - FlightApp{% endblock %}

{% block guest_content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Verify Your Email</h2>
            <p class="text-gray-500 text-sm mt-2">Enter the code sent to your email</p>
        </div>

        <form action="" method="POST" class="space-y-6">
            <div>
                <label for="otp" class="block text-sm font-medium text-gray-700">Enter OTP</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <input type="text" name="otp" id="otp" required
                        class="focus:ring-primary focus:border-primary block w-full text-center text-2xl tracking-widest sm:text-sm border-gray-300 rounded-md py-2 px-3 border"
                        placeholder="123456" maxlength="6">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-150 transform hover:scale-[1.01]">
                    Verify
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

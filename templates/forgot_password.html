{% extends "base.html" %}

{% block title %}Forgot Password - FlightApp{% endblock %}

{% block guest_content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900">Reset Password</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your email to receive a reset code</p>
        </div>

        <form action="{{ url_for('forgot_password') }}" method="POST" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <input type="email" name="email" id="email" required
                        class="focus:ring-primary focus:border-primary block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border"
                        placeholder="you@example.com">
                </div>
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-150">
                    Send Reset Code
                </button>
            </div>
        </form>

        <div class="mt-6 text-center">
            <a href="{{ url_for('index') }}" class="font-medium text-gray-600 hover:text-gray-500 text-sm">Back to
                Login</a>
        </div>
    </div>
</div>
{% endblock %}

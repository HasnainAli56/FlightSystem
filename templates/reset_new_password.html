{% extends "base.html" %}

{% block title %}Reset Password - SkySwap{% endblock %}

{% block guest_content %}
<div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
    <div class="text-center mb-8">
        <div class="bg-primary/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <i class="fas fa-lock text-primary text-2xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-dark">Set new password</h2>
        <p class="text-gray-500 text-sm mt-2">Choose a secure password for your account.</p>
    </div>

    <form method="POST" class="space-y-6">
        <div>
            <label for="password" class="block text-sm font-bold text-gray-700 mb-2">New Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            <div class="mt-3 h-2 rounded-full bg-slate-100 overflow-hidden">
                <div id="passwordStrengthBar" class="h-full w-0 rounded-full transition-all"></div>
            </div>
            <p id="passwordStrength" class="text-sm mt-2 text-gray-500"></p>
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-primary/30">
            Reset Password
        </button>
    </form>
</div>

<script>
const passwordInput = document.getElementById("password");
const strengthText = document.getElementById("passwordStrength");
const strengthBar = document.getElementById("passwordStrengthBar");

passwordInput.addEventListener("input", function() {
    const password = passwordInput.value;
    let score = 0;
    if (password.length >= 8) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[a-z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[!@#$%^&*]/.test(password)) score++;

    if (!password) {
        strengthText.textContent = "";
        strengthBar.className = "h-full w-0 rounded-full transition-all";
    } else if (score <= 2) {
        strengthText.textContent = "Weak password";
        strengthText.className = "text-red-500 text-sm mt-2 font-semibold";
        strengthBar.className = "h-full w-1/3 rounded-full transition-all bg-red-500";
    } else if (score <= 4) {
        strengthText.textContent = "Medium password";
        strengthText.className = "text-amber-500 text-sm mt-2 font-semibold";
        strengthBar.className = "h-full w-2/3 rounded-full transition-all bg-amber-500";
    } else {
        strengthText.textContent = "Strong password";
        strengthText.className = "text-emerald-500 text-sm mt-2 font-semibold";
        strengthBar.className = "h-full w-full rounded-full transition-all bg-emerald-500";
    }
});
</script>
{% endblock %}
